services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      GCD_DATA_DIR: /data
      GCD_SQLITE_PATH: /data/gcd_v2.sqlite3
      GCD_LANCEDB_DIR: /data/lancedb_v2
    volumes:
      - gcd-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3

  mcp:
    build: .
    command: ["gcd-mcp-http"]
    ports:
      - "8001:8001"
    environment:
      GCD_DATA_DIR: /data
      GCD_SQLITE_PATH: /data/gcd_v2.sqlite3
      GCD_LANCEDB_DIR: /data/lancedb_v2
      GCD_MCP_HOST: 0.0.0.0
      GCD_MCP_PORT: 8001
      GCD_MCP_PATH: /mcp
    volumes:
      - gcd-data:/data
    depends_on:
      app:
        condition: service_healthy

volumes:
  gcd-data:
